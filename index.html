<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Embudo de propuestas — Click+Clack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#fafaf7;--surface:#fff;--surface-2:#f1efe8;--text-1:#2c2c2a;--text-2:#5f5e5a;--text-3:#888780;--border-1:rgba(0,0,0,.08);--border-2:rgba(0,0,0,.18);--r:8px}
  @media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--surface:#242422;--surface-2:#2c2c2a;--text-1:#f1efe8;--text-2:#b4b2a9;--text-3:#888780;--border-1:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.18)}}
  *{box-sizing:border-box}html,body{margin:0;padding:0;background:var(--bg);color:var(--text-1);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased}
  .page{max-width:1280px;margin:0 auto;padding:32px 24px 64px}
  .hd{display:flex;justify-content:space-between;align-items:flex-end;gap:1rem;margin-bottom:1.25rem;flex-wrap:wrap}
  .hd h1{font-size:22px;font-weight:500;margin:0}
  .hd-sub{font-size:13px;color:var(--text-2);margin:4px 0 0}
  .hd-ct{font-size:13px;color:var(--text-2)}
  .sh{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin:0 0 8px;font-weight:500}
  /* Each section (funnel, terminal) is a positioning context for its dots overlay */
  .section{position:relative;margin-bottom:1.5rem}
  .gr{display:grid;gap:6px}
  .gr-f{grid-template-columns:repeat(6,minmax(0,1fr))}
  .gr-t{grid-template-columns:repeat(4,minmax(0,1fr))}
  @media(max-width:700px){.gr-f{grid-template-columns:repeat(3,minmax(0,1fr))}.gr-t{grid-template-columns:repeat(2,minmax(0,1fr))}}
  .cl{background:var(--surface-2);border-radius:var(--r);padding:10px 8px;min-height:200px;display:flex;flex-direction:column;overflow:visible}
  .cl.tm{min-height:140px}
  .cl-h{font-size:11px;color:var(--text-2);margin-bottom:2px;line-height:1.3;min-height:28px}
  .cl-c{font-size:20px;font-weight:500;margin-bottom:8px;transition:color .3s}
  .ds{flex:1;min-height:40px;position:relative}
  /* Overlay: absolute layer above the grid that holds all dots */
  .overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .dt{position:absolute;width:11px;height:11px;border-radius:50%;cursor:pointer;pointer-events:auto;transition:left .65s cubic-bezier(.5,0,.1,1),top .65s cubic-bezier(.5,0,.1,1),opacity .45s ease,transform .15s ease,box-shadow .15s ease;will-change:left,top}
  .dt:hover{transform:scale(1.6);box-shadow:0 0 0 2px var(--bg),0 0 0 3px var(--border-2);z-index:10}
  .dt.dm{opacity:.18}.dt.tm{opacity:.55}.dt.tm:hover{opacity:1}.dt.tm.dm{opacity:.12}
  .dt.entering{opacity:0;transform:scale(.3)}
  .dt.leaving{opacity:0;transform:scale(.3);pointer-events:none}
  .lg{display:flex;flex-wrap:wrap;gap:14px;font-size:12px;color:var(--text-2);margin-bottom:1rem;align-items:center}
  .li{display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none;padding:2px 6px;border-radius:var(--r)}
  .li:hover{background:var(--surface-2)}.li.off{opacity:.4}
  .ld{width:10px;height:10px;border-radius:50%}
  .tp{position:fixed;background:var(--surface);border:.5px solid var(--border-2);border-radius:var(--r);padding:8px 10px;font-size:12px;max-width:280px;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:1000;opacity:0;transition:opacity .1s;color:var(--text-1)}
  .tp.on{opacity:1}
  .tp-t{font-weight:500;margin-bottom:3px;line-height:1.3}
  .tp-r{color:var(--text-2);font-size:11px;line-height:1.4}
  .sl{background:var(--surface-2);border-radius:var(--r);padding:12px 14px;display:flex;gap:14px;align-items:center;font-size:13px;flex-wrap:wrap;margin-bottom:1.5rem}
  .sl label{color:var(--text-2)}.sl input[type=range]{flex:1;min-width:140px}
  .sl-v{font-weight:500;min-width:100px;text-align:right}
  .sl-b{background:none;border:.5px solid var(--border-2);border-radius:var(--r);padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text-2);font-family:inherit}
  .sl-b:hover{background:var(--surface)}
  .ft{margin-top:32px;font-size:11px;color:var(--text-3);text-align:center}
</style>
</head>

<div class="page">
  <div class="hd">
    <div>
      <h1>Embudo de propuestas — Click+Clack</h1>

    <div class="hd-ct"><span id="ct"></span></div>
  </div>
  <div class="lg" id="lg"></div>

  <div class="section" id="sec-f">
    <div class="gr gr-f" id="fn"></div>
    <div class="overlay" id="ov-f"></div>
  </div>

  <p class="sh">Estados terminales</p>
  <div class="section" id="sec-t">
    <div class="gr gr-t" id="tm"></div>
    <div class="overlay" id="ov-t"></div>
  </div>

  <div class="sl" id="sl" style="display:none">
    <button class="sl-b" id="sb-prev" title="Semana anterior">←</button>
    <input type="range" id="sr" min="0" max="0" value="0" step="1" />
    <button class="sl-b" id="sb-next" title="Semana siguiente">→</button>
    <button class="sl-b" id="sb-play" title="Reproducir evolución">▶ Reproducir</button>
    <span class="sl-v" id="sv">—</span>
  </div>
  <p class="ft">Click+Clack · pasa el cursor sobre cualquier punto para ver detalles · clic en la leyenda para filtrar por canal</p>
</div>

  }

  var te=function(){return document.getElementById('tp')};
  function st(h,x,y){var t=te();t.innerHTML=h;t.classList.add('on');var r=t.getBoundingClientRect();var lx=x+12,ly=y+12;if(lx+r.width>window.innerWidth-8)lx=x-r.width-12;if(ly+r.height>window.innerHeight-8)ly=y-r.height-12;t.style.left=lx+'px';t.style.top=ly+'px'}
  function ht(){te().classList.remove('on')}
  function tipHtml(l){var v=fmtCOP(l.cop);var m=[ec(l.canal),v];if(l.responsable)m.push(ec(l.responsable));if(l.pais)m.push(ec(l.pais));return'<div class="tp-t">'+ec(l.cliente)+'</div><div class="tp-r">'+ec(l.titulo||'(sin título)')+'</div><div class="tp-r" style="margin-top:4px"><b style="color:'+(CC[l.canal]||CC['Sin clasificar'])+'">●</b> '+m.join(' · ')+'</div>'}

  function createDot(lead){
    var d=document.createElement('div');
    d.className='dt entering'+(isTerminal(lead.stage)?' tm':'');
    d.style.background=CC[lead.canal]||CC['Sin clasificar'];
    d.dataset.leadId=lead.id;
    d.addEventListener('mouseenter',function(e){var l=leadDataById[lead.id];if(l)st(tipHtml(l),e.clientX,e.clientY)});
    d.addEventListener('mousemove',function(e){st(te().innerHTML,e.clientX,e.clientY)});
    d.addEventListener('mouseleave',ht);
    return d;
  }

  function isTerminal(stage){return T.some(function(t){return t.k===stage})}
  function stageMeta(stage){
    var f=F.find(function(x){return x.k===stage});if(f)return f;
    var t=T.find(function(x){return x.k===stage});if(t)return t;
    return null;
  }

  // Compute the target absolute position of a dot within its overlay (section-relative)
  function computePosition(stageId, indexInColumn, sectionEl){
    var ds=document.getElementById('d-'+stageId);
    if(!ds||!sectionEl)return{x:0,y:0};
    var dsRect=ds.getBoundingClientRect();
    var secRect=sectionEl.getBoundingClientRect();
    var dotSize=11,gap=4,step=dotSize+gap;
    var w=ds.clientWidth;
    var perRow=Math.max(1,Math.floor((w+gap)/step));
    var col=indexInColumn%perRow, row=Math.floor(indexInColumn/perRow);
    // Position relative to the section (where overlay lives), inside the .ds padding area
    var x=dsRect.left-secRect.left+col*step;
    var y=dsRect.top-secRect.top+row*step;
    return{x:x,y:y};
  }

  function renderSnapshot(){
    var snap=snaps[ci];var leads=snap.leads;
    document.getElementById('sd').textContent=snap.snapshot_date;
    if(snaps.length>1)document.getElementById('sv').textContent=snap.snapshot_date;

    leadDataById={};
    var byStage={};ALL.forEach(function(s){byStage[s.id]=[]});
    leads.forEach(function(l){
      leadDataById[l.id]=l;
      var sm=stageMeta(l.stage);
      if(sm)byStage[sm.id].push(l);
    });

    var currentIds=new Set(leads.map(function(l){return l.id}));
    var secF=document.getElementById('sec-f');
    var secT=document.getElementById('sec-t');
    var ovF=document.getElementById('ov-f');
    var ovT=document.getElementById('ov-t');

    // 1. Create new dots for leads that don't have elements yet
    leads.forEach(function(l){
      if(!dotEls[l.id]){
        var d=createDot(l);
        var sm=stageMeta(l.stage);
        var ov=sm&&sm.sec==='t'?ovT:ovF;
        ov.appendChild(d);
        dotEls[l.id]=d;
      }
    });

    // 2. For each existing dot: update color/terminal class and move to correct overlay if needed
    leads.forEach(function(l){
      var d=dotEls[l.id];
      var sm=stageMeta(l.stage);
      var targetOv=sm&&sm.sec==='t'?ovT:ovF;
      if(d.parentElement!==targetOv){
        // Before moving between overlays, compute current visual position and set it as starting point
        // so the transition starts from where the dot visually is
        var oldRect=d.getBoundingClientRect();
        targetOv.appendChild(d);
        var newSecRect=targetOv.getBoundingClientRect();
        // Set starting position in the new overlay's coordinate space (no animation)
        d.style.transition='none';
        d.style.left=(oldRect.left-newSecRect.left)+'px';
        d.style.top=(oldRect.top-newSecRect.top)+'px';
        // Force reflow
        d.offsetHeight;
        d.style.transition='';
      }
      d.style.background=CC[l.canal]||CC['Sin clasificar'];
      if(isTerminal(l.stage))d.classList.add('tm');else d.classList.remove('tm');
    });

    // 3. Mark leaving dots
    Object.keys(dotEls).forEach(function(id){
      if(!currentIds.has(id)){
        var d=dotEls[id];
        if(!d.classList.contains('leaving')){
          d.classList.add('leaving');
          setTimeout(function(){
            if(d.parentElement)d.parentElement.removeChild(d);
            delete dotEls[id];
          },500);
        }
      }
    });

    // 4. Compute target positions for every dot and apply
    ALL.forEach(function(s){
      var secEl=s.sec==='t'?secT:secF;
      byStage[s.id].forEach(function(l,i){
        var d=dotEls[l.id];
        var p=computePosition(s.id,i,secEl);
        d.style.left=p.x+'px';
        d.style.top=p.y+'px';
        // Remove entering class on next frame for fade-in
        if(d.classList.contains('entering')){
          requestAnimationFrame(function(){
            requestAnimationFrame(function(){d.classList.remove('entering')});
          });
        }
      });
    });

    updateVisibility();
  }

  function updateVisibility(){
    Object.keys(dotEls).forEach(function(id){
      var l=leadDataById[id];if(!l)return;
      var d=dotEls[id];
      if(ac.has(l.canal))d.classList.remove('dm');else d.classList.add('dm');
    });
    // Recount per column
    var snap=snaps[ci];
    var counts={};ALL.forEach(function(s){counts[s.id]=0});
    snap.leads.forEach(function(l){
      if(!ac.has(l.canal))return;
      var sm=stageMeta(l.stage);if(sm)counts[sm.id]++;
    });
    ALL.forEach(function(s){
      var el=document.getElementById('c-'+s.id);
      if(el)el.textContent=counts[s.id];
    });
    var tot=snap.leads.filter(function(l){return ac.has(l.canal)}).length;
    document.getElementById('ct').textContent=tot+' propuestas mostradas · '+snap.leads.length+' totales';
  }

  if(snaps.length>1){
    var sld=document.getElementById('sl');sld.style.display='flex';
    var sr=document.getElementById('sr');sr.max=snaps.length-1;sr.value=ci;
    sr.addEventListener('input',function(e){stopPlay();ci=parseInt(e.target.value,10);renderSnapshot()});
    document.getElementById('sb-prev').addEventListener('click',function(){stopPlay();if(ci>0){ci--;sr.value=ci;renderSnapshot()}});
    document.getElementById('sb-next').addEventListener('click',function(){stopPlay();if(ci<snaps.length-1){ci++;sr.value=ci;renderSnapshot()}});
    document.getElementById('sb-play').addEventListener('click',togglePlay);
  }

  function togglePlay(){
    if(playing){stopPlay();return}
    playing=true;
    document.getElementById('sb-play').textContent='⏸ Pausar';
    if(ci>=snaps.length-1)ci=0;
    var sr=document.getElementById('sr');sr.value=ci;renderSnapshot();
    playTimer=setInterval(function(){
      if(ci>=snaps.length-1){stopPlay();return}
      ci++;sr.value=ci;renderSnapshot();
    },1400);
  }
  function stopPlay(){
    playing=false;
    if(playTimer){clearInterval(playTimer);playTimer=null}
    var b=document.getElementById('sb-play');if(b)b.textContent='▶ Reproducir';
  }

  var resizeTimer;
  window.addEventListener('resize',function(){
    clearTimeout(resizeTimer);
    resizeTimer=setTimeout(renderSnapshot,150);
  });

  buildSkeleton();
  buildLegend();
  // First render: wait for layout
  requestAnimationFrame(function(){requestAnimationFrame(renderSnapshot)});
})();
</script>
</body>
</html>
