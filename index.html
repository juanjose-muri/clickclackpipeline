<script>
(function(){
  const FUNNEL = [
    {key:'1 - Oportunidad identificada', short:'Oportunidad', n:1},
    {key:'2 - Pre-selección (lista corta)', short:'Pre-selección', n:2},
    {key:'3 - En formulación', short:'En formulación', n:3},
    {key:'4 - Propuesta enviada', short:'Enviada', n:4},
    {key:'5 - Negociación', short:'Negociación', n:5},
    {key:'6 - Ganada', short:'Ganada', n:6},
  ];
  const TERMINAL = [
    {key:'Perdida', short:'Perdida'},
    {key:'Desistida', short:'Desistida'},
    {key:'Sin respuesta', short:'Sin respuesta'},
    {key:'No preseleccionada', short:'No preseleccionada'},
  ];
  const CANAL_COLORS = {
    'Oportunidad abierta':'#7F77DD','Gestión comercial':'#1D9E75','Recompra':'#D85A30',
    'Contacto directo':'#378ADD','Recomendados':'#D4537E','Asociados':'#BA7517','Sin clasificar':'#888780',
  };
  const SNAP = JSON.parse(document.getElementById('ccc-data').textContent);
  let activeCanales = new Set(Object.keys(CANAL_COLORS));

  function buildLegend(){
    const wrap = document.getElementById('ccc-legend');
    Object.entries(CANAL_COLORS).forEach(([canal, color]) => {
      if (!SNAP.leads.some(l => l.canal === canal)) return;
      const el = document.createElement('div');
      el.className = 'ccc-lg-item';
      el.innerHTML = '<span class="ccc-lg-dot" style="background:'+color+'"></span><span>'+canal+'</span>';
      el.addEventListener('click', () => {
        if (activeCanales.has(canal)) activeCanales.delete(canal); else activeCanales.add(canal);
        if (activeCanales.size === 0) activeCanales = new Set(Object.keys(CANAL_COLORS));
        el.classList.toggle('off', !activeCanales.has(canal));
        render();
      });
      wrap.appendChild(el);
    });
  }

  const tipEl = () => document.getElementById('ccc-tip');
  function showTip(html, x, y){
    const t = tipEl(); t.innerHTML = html; t.classList.add('on');
    const r = t.getBoundingClientRect();
    let lx = x + 12, ly = y + 12;
    if (lx + r.width > window.innerWidth - 8) lx = x - r.width - 12;
    if (ly + r.height > window.innerHeight - 8) ly = y - r.height - 12;
    t.style.left = lx + 'px'; t.style.top = ly + 'px';
  }
  function hideTip(){ tipEl().classList.remove('on'); }
  function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function buildTipHtml(l){
    const usd = l.usd != null ? '$' + Math.round(l.usd).toLocaleString('en-US') + ' USD' : 'Sin valor';
    const meta = [esc(l.canal), usd];
    if (l.responsable) meta.push(esc(l.responsable));
    if (l.pais) meta.push(esc(l.pais));
    return '<div class="ccc-tip-t">' + esc(l.cliente) + '</div>' +
      '<div class="ccc-tip-r">' + esc(l.titulo || '(sin título)') + '</div>' +
      '<div class="ccc-tip-r" style="margin-top:4px"><b style="color:'+CANAL_COLORS[l.canal]+'">●</b> ' + meta.join(' · ') + '</div>';
  }

  function buildColumn(stage, leads, isTerminal){
    const inStage = leads.filter(l => l.stage === stage.key);
    const visible = inStage.filter(l => activeCanales.has(l.canal));
    const col = document.createElement('div');
    col.className = 'ccc-col' + (isTerminal ? ' terminal' : '');
    const sub = inStage.length !== visible.length
      ? ' <span style="font-size:11px;color:var(--text-3);font-weight:400">de '+inStage.length+'</span>' : '';
    const label = isTerminal ? stage.short : (stage.n + '. ' + stage.short);
    col.innerHTML =
      '<div class="ccc-col-h">' + label + '</div>' +
      '<div class="ccc-col-c">' + visible.length + sub + '</div>' +
      '<div class="ccc-dots"></div>';
    const dots = col.querySelector('.ccc-dots');
    inStage.forEach(l => {
      const d = document.createElement('div');
      d.className = 'ccc-dot' + (isTerminal ? ' terminal' : '') + (activeCanales.has(l.canal) ? '' : ' dim');
      d.style.background = CANAL_COLORS[l.canal] || CANAL_COLORS['Sin clasificar'];
      d.addEventListener('mouseenter', e => showTip(buildTipHtml(l), e.clientX, e.clientY));
      d.addEventListener('mousemove', e => showTip(tipEl().innerHTML, e.clientX, e.clientY));
      d.addEventListener('mouseleave', hideTip);
      dots.appendChild(d);
    });
    return col;
  }

  function render(){
    const leads = SNAP.leads;
    const fwrap = document.getElementById('ccc-funnel');
    fwrap.innerHTML = '';
    FUNNEL.forEach(stage => fwrap.appendChild(buildColumn(stage, leads, false)));
    const twrap = document.getElementById('ccc-terminal');
    twrap.innerHTML = '';
    TERMINAL.forEach(stage => twrap.appendChild(buildColumn(stage, leads, true)));
    const total = leads.filter(l => activeCanales.has(l.canal)).length;
    document.getElementById('ccc-count').textContent = total + ' propuestas mostradas · ' + leads.length + ' totales';
    document.getElementById('ccc-snapdate').textContent = SNAP.snapshot_date;
  }
  buildLegend();
  render();
})();
</script>
